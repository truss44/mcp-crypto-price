name: mcp-crypto-price
description: >
  Real-time cryptocurrency data and analysis via CoinCap API.
  Includes price tracking, market analysis across exchanges, and historical trends.
icon: "https://raw.githubusercontent.com/truss44/mcp-crypto-price/main/logo.png"
license: MIT
homepage: https://github.com/truss44/mcp-crypto-price

startCommand:
  type: http
  configSchema:
    type: object
    properties:
      coincapApiKey:
        type: string
        description: "API key for CoinCap v3 API (required). Free tier available at https://pro.coincap.io/dashboard"
    required:
      - coincapApiKey
