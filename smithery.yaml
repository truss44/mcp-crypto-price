name: mcp-crypto-price
description: >
  Real-time cryptocurrency data and analysis via CoinCap API.
  Includes price tracking, market analysis across exchanges, and historical trends.
iconUrl: https://raw.githubusercontent.com/truss44/mcp-crypto-price/main/logo.png
license: MIT
homepage: https://github.com/truss44/mcp-crypto-price

startCommand:
  type: stdio
  commandType: npx
  configSchema:
    type: object
    properties:
      coincapApiKey:
        type: string
        description: Optional API key for CoinCap to increase rate limits
        nullable: true
    required: []
