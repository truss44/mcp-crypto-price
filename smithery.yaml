name: mcp-crypto-price
description: >
  Real-time cryptocurrency data and analysis via CoinCap API.
  Includes price tracking, market analysis across exchanges, and historical trends.
icon: "https://raw.githubusercontent.com/truss44/mcp-crypto-price/main/logo.png"
license: MIT
homepage: "https://github.com/truss44/mcp-crypto-price"

startCommand:
  type: http
  configSchema:
    type: object
    properties:
      COINCAP_API_KEY:
        type: string
        title: "CoinCap API Key"
        description: "API key for CoinCap v3 API. Free tier available at https://pro.coincap.io/dashboard"
      CACHE_TTL_SECONDS:
        type: integer
        title: "Cache Duration (seconds)"
        description: "How long to cache API responses in seconds. Lower values return fresher data; higher values reduce API usage."
        default: 60
        minimum: 10
        maximum: 3600
    required:
      - COINCAP_API_KEY
  exampleConfig:
    COINCAP_API_KEY: "your-coincap-api-key-here"
    CACHE_TTL_SECONDS: 60
