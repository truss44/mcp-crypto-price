name: Release
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read # for checkout
  
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Test
        run: pnpm test 
      
      - name: Configure Git identity
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Configure SSH commit signing
        env:
          SSH_SIGNING_KEY: ${{ secrets.SSH_SIGNING_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_SIGNING_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          git config gpg.format ssh
          git config user.signingkey ~/.ssh/id_ed25519.pub
          git config commit.gpgsign true

      - name: Build
        run: pnpm build

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: pnpm audit signatures

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          DEBUG: semantic-release:*
        run: pnpm dlx semantic-release

      - name: Update 'latest' tag to most recent release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -e
          git fetch --tags --force
          # Determine the most recent tag (highest SemVer tag)
          LATEST_TAG=$(git tag --sort=-version:refname | head -n 1)
          echo "Most recent release tag: $LATEST_TAG"
          # Point/move local 'latest' tag to that tag's commit
          git tag -f latest "$LATEST_TAG"
          # Remove remote 'latest' if it exists (ignore error), then push updated tag
          git push origin :refs/tags/latest || true
          git push origin refs/tags/latest